<!-- Contenedor principal -->
<div class="login-container">

    <!-- Imagen lateral -->
    <div class="login-image">

        <div class="overlay">

            <h2>Welcome to EventFlow</h2>

            <p>
                Manage academic events easily and efficiently
            </p>

        </div>

    </div>

    <!-- Tarjeta del login -->
    <div class="login-card">

        <!-- Título -->
        <h1>EventFlow</h1>

        <p class="subtitle">
            Academic Events Platform
        </p>

        <!-- Formulario -->
        <form id="loginForm">

            <!-- Campo email -->
            <div class="form-group">

                <label for="email">Email</label>

                <input 
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                >

            </div>

            <!-- Campo contraseña -->
            <div class="form-group">

                <label for="password">Password</label>

                <input 
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                >

            </div>

            <!-- Mensaje -->
            <p id="message"></p>

            <!-- Botón -->
            <button type="submit" id="loginBtn">
                Login
            </button>

        </form>

    </div>

</div>
